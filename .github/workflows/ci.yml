name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

env:
  SRC_DIR: src
  ENGINE_DIR: src/mademanifest-engine

jobs:
  test-http-service:
    name: Test HTTP Service
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: src/mademanifest-engine/go.mod
          cache-dependency-path: src/mademanifest-engine/go.sum

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential ca-certificates curl patch rsync

      - name: Build and install Swiss Ephemeris
        run: |
          set -euo pipefail
          cd "$SRC_DIR/ephemeris/swisseph"
          rm -rf swisseph-2.10.03
          tar zxf swisseph-2.10.03.tar.gz
          cd swisseph-2.10.03
          patch -p1 < ../../../swisseph-makefile-install.patch
          make PREFIX=/usr/local libswe.so libswe.a
          sudo install -d /usr/local/lib /usr/local/include /usr/local/share/swisseph
          sudo install -m 644 libswe.so libswe.a /usr/local/lib/
          sudo install -m 644 sweph.h swephexp.h /usr/local/include/
          sudo rsync -a "$GITHUB_WORKSPACE/$SRC_DIR/ephemeris/data/REQUIRED_EPHEMERIS_FILES/" /usr/local/share/swisseph/
          sudo ldconfig

      - name: Run Go tests
        working-directory: ${{ env.ENGINE_DIR }}
        env:
          LD_LIBRARY_PATH: /usr/local/lib
          SE_EPHE_PATH: /usr/local/share/swisseph
        run: |
          go mod download
          go test ./pkg/...

      - name: Build HTTP server
        working-directory: ${{ env.ENGINE_DIR }}
        env:
          LD_LIBRARY_PATH: /usr/local/lib
        run: CGO_LDFLAGS="-lm" go build -o mademanifest-http ./cmd/httpserver

      - name: Start HTTP server
        working-directory: ${{ env.ENGINE_DIR }}
        env:
          PORT: "18080"
          CANON_DIRECTORY: ${{ github.workspace }}/src/canon
          SE_EPHE_PATH: /usr/local/share/swisseph
          LD_LIBRARY_PATH: /usr/local/lib
        run: |
          set -euo pipefail
          ./mademanifest-http > /tmp/mademanifest-http.log 2>&1 &
          echo $! > /tmp/mademanifest-http.pid

      - name: Verify HTTP endpoints
        run: |
          set -euo pipefail
          trap 'kill "$(cat /tmp/mademanifest-http.pid)" || true; cat /tmp/mademanifest-http.log || true' EXIT
          sleep 3
          curl --fail --silent --show-error http://127.0.0.1:18080/healthz
          curl --fail --silent --show-error \
            -X POST \
            -H 'Content-Type: application/json' \
            --data-binary @"$GITHUB_WORKSPACE/$SRC_DIR/golden/GOLDEN_TEST_CASE_V1.json" \
            http://127.0.0.1:18080/manifest \
            -o "$RUNNER_TEMP/out-http.json"
          test -s "$RUNNER_TEMP/out-http.json"

  validate-kubernetes:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install kubeconform
        run: |
          set -euo pipefail
          version="v0.6.7"
          arch="linux-amd64"
          url="https://github.com/yannh/kubeconform/releases/download/${version}/kubeconform-${arch}.tar.gz"
          curl -fsSL "$url" | tar xz
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Validate manifests
        run: |
          kubeconform -strict -summary \
            "$SRC_DIR/deploy/kubernetes/configmap.yaml" \
            "$SRC_DIR/deploy/kubernetes/deployment.yaml" \
            "$SRC_DIR/deploy/kubernetes/service.yaml"
