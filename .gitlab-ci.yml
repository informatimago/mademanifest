stages:
  - test

variables:
  SRC_DIR: src
  ENGINE_DIR: src/mademanifest-engine

test-http-service:
  stage: test
  image: golang:1.22-bookworm
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends build-essential ca-certificates curl patch rsync
    - cd "$SRC_DIR/ephemeris/swisseph"
    - rm -rf swisseph-2.10.03
    - tar zxf swisseph-2.10.03.tar.gz
    - cd swisseph-2.10.03
    - patch -p1 < ../../../swisseph-makefile-install.patch
    - make PREFIX=/usr/local
    - make PREFIX=/usr/local install
    - mkdir -p /usr/local/share/swisseph
    - rsync -a "$CI_PROJECT_DIR/$SRC_DIR/ephemeris/data/REQUIRED_EPHEMERIS_FILES/" /usr/local/share/swisseph/
  script:
    - cd "$CI_PROJECT_DIR/$ENGINE_DIR"
    - go test ./pkg/...
    - CGO_LDFLAGS="-lm" go build -o mademanifest-http ./cmd/httpserver
    - PORT=18080 CANON_DIRECTORY="$CI_PROJECT_DIR/$SRC_DIR/canon" SE_EPHE_PATH=/usr/local/share/swisseph ./mademanifest-http &
    - SERVER_PID=$!
    - trap 'kill $SERVER_PID' EXIT
    - sleep 3
    - curl --fail --silent --show-error http://127.0.0.1:18080/healthz
    - curl --fail --silent --show-error http://127.0.0.1:18080/version | grep -q '"engine_version"'
    # POST a canonical Trinity payload (the Schiedam baseline) and
    # require a 200 status with a non-empty success-envelope body.
    # The PoC GOLDEN_TEST_CASE_V1.json shape is no longer accepted
    # on /manifest – it would correctly be rejected as invalid_input
    # since Phase 2.
    - curl --fail --silent --show-error -X POST -H 'Content-Type: application/json' --data-binary @"$CI_PROJECT_DIR/$SRC_DIR/golden/trinity/baseline/schiedam_1990_04_09_input.json" http://127.0.0.1:18080/manifest -o out-http.json
    - test -s out-http.json
    # The handler emits compact JSON via json.Marshal, no spaces.
    - grep -q '"status":"success"' out-http.json

validate-kubernetes:
  stage: test
  image: ghcr.io/yannh/kubeconform:latest
  script:
    - kubeconform -strict -summary "$SRC_DIR/deploy/kubernetes/configmap.yaml" "$SRC_DIR/deploy/kubernetes/deployment.yaml" "$SRC_DIR/deploy/kubernetes/service.yaml"
