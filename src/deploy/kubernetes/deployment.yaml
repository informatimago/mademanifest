apiVersion: apps/v1
kind: Deployment
metadata:
  name: mademanifest
  labels:
    app: mademanifest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mademanifest
  template:
    metadata:
      labels:
        app: mademanifest
    spec:
      containers:
        - name: mademanifest
          image: registry.example.com/mademanifest/phase-4:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: mademanifest-config
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
